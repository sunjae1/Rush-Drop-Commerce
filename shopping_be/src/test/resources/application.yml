spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ssl:
        enabled: false

app:
  jwt:
    access-secret: test-jwt-secret-key-that-is-at-least-32-bytes
    access-token-expiration: 5m
    refresh-token-expiration: 14d
    issuer: shopping-test
  security:
    cookie:
      access-token-name: ACCESS_TOKEN
      refresh-token-name: REFRESH_TOKEN
      access-token-path: /api
      refresh-token-path: /api/auth
      domain:
      same-site: Lax
      secure: false

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region: ap-northeast-2
    s3:
      bucket: test-bucket
      presigned-url-expiration: 60

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
