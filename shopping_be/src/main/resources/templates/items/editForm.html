<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Item</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<header>
    <h1>My Shopping Mall</h1>
</header>

<nav>
    <div class="nav-links">
        <a th:href="@{/}">홈</a>
        <a th:href="@{/items}">상품 관리 페이지</a>
    <a th:href="@{/categories}">카테고리</a>
        <a th:href="@{/posts}">게시판</a>
    </div>
    <div class="user-actions">
        <!-- 장바구니 아이콘 (항상 표시) -->
        <a th:href="@{/items/cartAll}" class="nav-icon-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        </a>
        <!-- 프로필 아이콘 및 드롭다운 메뉴 -->
        <div class="profile-menu-container">
            <button class="nav-icon-link profile-icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
            <div class="dropdown-menu">
                <!-- 로그인 안된 경우 -->
                <div th:if="${user == null}">
                    <a th:href="@{/login}" class="dropdown-item">로그인</a>
                    <a th:href="@{/register}" class="dropdown-item">회원가입</a>
                </div>
                <!-- 로그인 된 경우 -->
                <div th:if="${user != null}">
                    <div class="dropdown-header" th:text="${user.name} + '님'">사용자 이름</div>
                    <a th:href="@{/mypage}" class="dropdown-item">마이 페이지</a>
                    <a th:href="@{/items/orderAll}" class="dropdown-item">주문 내역</a>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item btn-link">로그아웃</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-container">
        <h2 class="form-title">상품 수정</h2>

        <form th:action th:object="${item}" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label for="itemName">상품 이름</label>
                <input type="text" id="itemName" th:field="*{itemName}" class="form-input">
                <div class="field-error" th:errors="*{itemName}"></div>
            </div>

            <div class="form-group">
                <label for="price">상품 가격</label>
                <input type="number" id="price" th:field="*{price}" class="form-input">
                <div class="field-error" th:errors="*{price}"></div>
            </div>

            <div class="form-group">
                <label for="quantity">상품 재고</label>
                <input type="number" id="quantity" th:field="*{quantity}" class="form-input">
                <div class="field-error" th:errors="*{quantity}"></div>
            </div>

            <div class="form-group">
                <label for="categoryId">카테고리</label>
                <select id="categoryId" th:field="*{categoryId}" class="form-input">
                    <option value="">카테고리 없음</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                        Category
                    </option>
                </select>
                <div class="field-error" th:errors="*{categoryId}"></div>
            </div>

            <div class="form-group">
                <label>현재 상품 사진</label>
                <div class="current-image-preview">
                    <img th:src="@{${item.imageUrl}}" alt="Current item image">
                  <input type="hidden" th:field="*{imageUrl}">
                </div>
            </div>

            <div class="form-group">
                <label for="imageFile">새로운 상품 사진(Optional)</label>
                <input type="file" id="imageFile" th:field="*{imageFile}" class="form-input">
                <div class="field-error" th:errors="*{imageFile}"></div>
            </div>

            <div class="button-container">
                <button th:onclick="|location.href='@{/items/{itemId}(itemId=${item.id})}'|" type="button" class="btn btn-secondary">취소</button>
                <button type="submit" class="btn btn-primary">변경 내용 저장</button>
            </div>
        </form>
    </div>
</div>

<!--공통 푸터-->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:replace="~{fragments/script :: script}"></div>

</body>
</html>
