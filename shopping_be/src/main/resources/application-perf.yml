spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/myshopping_perf?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:shopping}
    password: ${DB_PASSWORD:shopping123!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 60000
      maximum-pool-size: ${DB_POOL_SIZE:20}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: shopping-perf

logging:
  level:
    myex.shopping: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
