spring:
  application:
    name: shopping

  devtools:
    restart:
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

app:
  cors:
    allowed-origin: ${FRONT_END_ORIGIN:http://localhost:5173,https://localhost:5173}
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:${JWT_SECRET}}
    access-token-expiration: ${ACCESS_TOKEN_EXPIRE:${JWT_ACCESS_TOKEN_EXPIRATION:5m}}
    refresh-token-expiration: ${REFRESH_TOKEN_EXPIRE:14d}
    issuer: ${JWT_ISSUER:shopping-api}
  security:
    cookie:
      access-token-name: ${ACCESS_TOKEN_COOKIE_NAME:ACCESS_TOKEN}
      refresh-token-name: ${REFRESH_TOKEN_COOKIE_NAME:REFRESH_TOKEN}
      access-token-path: ${ACCESS_TOKEN_COOKIE_PATH:/api}
      refresh-token-path: ${REFRESH_TOKEN_COOKIE_PATH:/api/auth}
      domain: ${COOKIE_DOMAIN:}
      same-site: ${COOKIE_SAME_SITE:Lax}
      secure: ${COOKIE_SECURE:false}
  payment:
    toss:
      secret-key: ${TOSS_SECRET_KEY:}
      base-url: ${TOSS_API_BASE_URL:https://api.tosspayments.com}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_EXPIRATION:60}
