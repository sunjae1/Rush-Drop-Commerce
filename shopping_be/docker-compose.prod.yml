x-app-base: &app-base
  image: ${APP_IMAGE:-sunjae1/shopping-app:latest}
  pull_policy: always
  restart: unless-stopped
  env_file:
    - ./.env
  environment:
    SPRING_PROFILES_ACTIVE: prod
    REDIS_HOST: redis
  depends_on:
    redis:
      condition: service_healthy

services:
  redis:
    image: redis:7-alpine
    container_name: shopping-redis-prod
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app-blue:
    <<: *app-base
    container_name: shopping-app-blue
    ports:
      - "8080:8080"

  app-green:
    <<: *app-base
    container_name: shopping-app-green
    ports:
      - "8081:8080"

volumes:
  redis-data:
